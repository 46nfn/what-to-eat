<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFAF5"/>
      <stop offset="100%" stop-color="#F5E6D3"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="#E8D5C0" stroke-width="4"/>
  <!-- 碗 -->
  <ellipse cx="256" cy="300" rx="140" ry="100" fill="#F5D5A0" stroke="#D4A76A" stroke-width="3"/>
  <!-- 碗口 -->
  <ellipse cx="256" cy="260" rx="180" ry="60" fill="#FAE5C0" stroke="#D4A76A" stroke-width="3"/>
  <!-- 碗内食物 -->
  <ellipse cx="256" cy="255" rx="165" ry="50" fill="#FFF8ED"/>
  <!-- 热气 -->
  <path d="M180 200 Q175 170 185 145" fill="none" stroke="#D4A76A" stroke-width="4" stroke-linecap="round" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M256 190 Q252 155 260 130" fill="none" stroke="#D4A76A" stroke-width="4" stroke-linecap="round" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M330 200 Q325 165 335 145" fill="none" stroke="#D4A76A" stroke-width="4" stroke-linecap="round" opacity="0.6">
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="1.8s" repeatCount="indefinite"/>
  </path>
  <!-- 筷子 -->
  <line x1="180" y1="160" x2="280" y2="240" stroke="#8B6914" stroke-width="6" stroke-linecap="round"/>
  <line x1="210" y1="150" x2="310" y2="230" stroke="#8B6914" stroke-width="6" stroke-linecap="round"/>
  <!-- 文字 -->
  <text x="256" y="450" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#8B6914">🍜 这顿吃什么</text>
</svg>
